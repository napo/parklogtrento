name: update stats
on:
  schedule:
    - cron: "13 1 * * *"
  workflow_dispatch:

env:
  ACTIONS_ALLOW_UNSECURE_COMMANDS: true

jobs:
  scrape-latest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Pull LFS files
        run: git lfs pull
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install requirements
        run: pip install -r requirements.txt
      - name: run data4web 
        run: python data4web.py
      - name: run dashboard
        run: python dashboard_data.py
      - name: run forecast (solo parcheggi e ciclobox, mai gli stalli)
        run: python forecast.py
      - name: valuta le previsioni passate
        run: python forecast_score.py
      - name: firma gli asset per la cache dei browser
        run: python cache_bust.py
      - name: Commit and push if it changed
        run: |-
          git config user.name "napo"
          git config user.email "napo@fbk.eu"
          git add -A
          timestamp=$(date -u)
          git commit -m "Latest data: ${timestamp}" || exit 0
          git push
